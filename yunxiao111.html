<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>yunxiao</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 浪漫柔粉紫渐变背景 */
            background: linear-gradient(135deg, #fff0f6, #fde2e4, #e2dafa);
            overflow: hidden;
            touch-action: none; /* 阻止移动端默认的下拉刷新和双指操作，确保缩放顺滑 */
            cursor: grab;
        }
        body:active {
            cursor: grabbing;
        }
        /* 全屏画布 */
        #heartCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
<canvas id="heartCanvas"></canvas>

<script>
    // ========== 核心配置 ==========
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    // 缩放与平移控制
    let scale = 0.8;        // 初始缩放
    const minScale = 0.3;   // 最小缩放
    const maxScale = 3.0;   // 最大缩放
    let scaleSpeed = 0.1;   // PC端缩放速度

    // 全局平移偏移量
    let offsetX = 0;
    let offsetY = 0;

    const particleCount = 800; // 保持你觉得最好的800颗粒子
    const name = '云萧';       // 你的专属名字

    // ========== 性能优化：离屏缓存 ==========
    // 提前把文字和圆点画成“图片”存起来，放大瞬间直接贴图，避免手机卡顿
    const colors = ['#ff8fab', '#ff5d8f', '#ffc2d1', '#f72585', '#b565a7'];
    
    // 1. 缓存「云萧」文字图片
    const textCaches = colors.map(color => {
        const c = document.createElement('canvas');
        c.width = 100; c.height = 100;
        const tCtx = c.getContext('2d');
        tCtx.fillStyle = color;
        tCtx.font = '50px serif';
        tCtx.textAlign = 'center';
        tCtx.textBaseline = 'middle';
        tCtx.fillText(name, 50, 50);
        return c;
    });

    // 2. 缓存光点图片
    const dotCaches = colors.map(color => {
        const c = document.createElement('canvas');
        c.width = 32; c.height = 32;
        const dCtx = c.getContext('2d');
        dCtx.fillStyle = color;
        dCtx.beginPath();
        dCtx.arc(16, 16, 8, 0, Math.PI * 2);
        dCtx.fill();
        return c;
    });


    // 心跳动画时间
    let time = 0;
    const particles = [];

    // ========== 粒子类 (完全保留原版逻辑) ==========
    class Particle {
        constructor() {
            // 粒子基础属性
            this.size = Math.random() * 2 + 1;
            this.opacity = Math.random() * 0.5 + 0.5;
            this.beatOffset = Math.random() * Math.PI * 2;
            
            this.colorIndex = Math.floor(Math.random() * colors.length);
            
            // 随机生成心形坐标
            this.setHeartPosition();
        }

        // 保持你原版的心形数学公式
        setHeartPosition() {
            const t = Math.random() * Math.PI * 2;
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            
            // 修复了原版放大时心形会偏离屏幕中心的计算问题，视觉效果不变
            this.baseX = x * 20;
            this.baseY = -y * 20;
        }

        // 更新粒子状态
        update() {
            const beat = Math.sin(time * 2 + this.beatOffset) * 0.15 + 1;
            
            // 围绕屏幕中心点缩放跳动，并叠加全局的拖拽平移量 offsetX 和 offsetY
            this.x = width / 2 + this.baseX * beat * scale + offsetX;
            this.y = height / 2 + this.baseY * beat * scale + offsetY;
            
            this.currentSize = this.size * scale;
        }

        // 绘制粒子
        draw() {
            ctx.globalAlpha = this.opacity;
            
            if (scale > 1.2) {
                // 放大状态：贴上文字图片 
                const imgSize = this.currentSize * 16; 
                ctx.drawImage(textCaches[this.colorIndex], this.x - imgSize/2, this.y - imgSize/2, imgSize, imgSize);
            } else {
                // 缩小状态：贴上光点图片
                const dotSize = this.currentSize * 4;
                ctx.drawImage(dotCaches[this.colorIndex], this.x - dotSize/2, this.y - dotSize/2, dotSize, dotSize);
            }
        }
    }

    // ========== 初始化粒子 ==========
    function initParticles() {
        particles.length = 0;
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
    }

    // ========== 动画循环 ==========
    function animate() {
        // 全局重置透明度
        ctx.globalAlpha = 1;
        // 保持你原版的拖影参数
        ctx.fillStyle = 'rgba(255,240,246,0.15)';
        ctx.fillRect(0, 0, width, height);
        
        time += 0.05;
        
        particles.forEach(p => {
            p.update();
            p.draw();
        });

        requestAnimationFrame(animate);
    }

    // ========== PC端：鼠标控制 (滚轮缩放 + 拖拽平移) ==========
    window.addEventListener('wheel', (e) => {
        if (e.deltaY < 0) {
            scale = Math.min(scale + scaleSpeed, maxScale);
        } else {
            scale = Math.max(scale - scaleSpeed, minScale);
        }
    });

    let isMouseDown = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    canvas.addEventListener('mousedown', (e) => {
        isMouseDown = true;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
    });

    window.addEventListener('mouseup', () => {
        isMouseDown = false;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isMouseDown) return;
        const deltaX = e.clientX - lastMouseX;
        const deltaY = e.clientY - lastMouseY;
        offsetX += deltaX;
        offsetY += deltaY;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
    });

    // ========== 移动端：手势控制 (双指缩放 + 单指平移) ==========
    let initialDistance = 0;
    let initialScale = 1;
    
    // 用于单指拖拽的状态
    let isTouching = false;
    let lastTouchX = 0;
    let lastTouchY = 0;

    function getDistance(touches) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        
        if (e.touches.length === 2) {
            // 双指：初始化缩放
            initialDistance = getDistance(e.touches);
            initialScale = scale;
            isTouching = false; // 双指模式下取消单指拖拽状态
        } else if (e.touches.length === 1) {
            // 单指：初始化拖拽
            isTouching = true;
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        
        if (e.touches.length === 2) {
            // 双指：处理缩放
            const currentDistance = getDistance(e.touches);
            const distanceRatio = currentDistance / initialDistance;
            scale = Math.min(Math.max(initialScale * distanceRatio, minScale), maxScale);
        } else if (e.touches.length === 1 && isTouching) {
            // 单指：处理平移
            const deltaX = e.touches[0].clientX - lastTouchX;
            const deltaY = e.touches[0].clientY - lastTouchY;
            offsetX += deltaX;
            offsetY += deltaY;
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
        }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        // 当所有手指离开屏幕时，重置拖拽状态
        if (e.touches.length === 0) {
            isTouching = false;
        }
    });

    // ========== 窗口适配 ==========
    window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        // 重置偏移量，保证居中
        offsetX = 0; 
        offsetY = 0;
        initParticles();
    });

    // 启动！
    initParticles();
    animate();
</script>
</body>
</html>
